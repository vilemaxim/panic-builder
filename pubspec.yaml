name: panic_at_the_dojo
description: Panic at the Dojo 1st Edition — character builder PWA.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  collection: ^1.19.1
  file_picker: ^8.1.6
  printing: ^5.13.4
  pdf: ^3.11.1
  intl: ^0.19.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    # Bundled playable rules (style skills: dart run tool/generate_style_skills.dart).
    - assets/data/rules.json
    - assets/data/_builds_extract.txt
    - assets/data/_archetypes_styles_extract.txt
    - assets/data/_winter_tail.txt
    - assets/fonts/
    - assets/icons/
    # List dice PNGs explicitly — registering only `assets/icons/` did not ship these files in web builds.
    - assets/icons/dice/d4.png
    - assets/icons/dice/d6.png
    - assets/icons/dice/d8.png
    - assets/icons/dice/d10.png
