<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">
  <script>
    // When `flutter run -d chrome` leaves the template token in place, relative
    // asset URLs resolve as assets/assets/... and raster bundles 404. Force `/`.
    (function () {
      var b = document.querySelector('base');
      if (!b) return;
      var h = (b.getAttribute('href') || '').trim();
      // Unreplaced template, empty base, or '.' break asset URLs (e.g.
      // rules.json fetched as assets/assets/... → 404).
      if (
        !h ||
        h === '.' ||
        h === './' ||
        h.indexOf('FLUTTER_BASE_HREF') !== -1
      ) {
        b.setAttribute('href', '/');
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Panic at the Dojo 1st Edition — character builder PWA.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="panic_at_the_dojo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Panic at the Dojo — Character Builder</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
