name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # v6+ avoids older Node runtimes used by early v4 tags (unrelated to `flutter test`, which uses Dart).
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Pin SDK so widget tests see a consistent asset pipeline (AssetManifest.bin).
          flutter-version: '3.38.2'
          # No cache: avoid stale-SDK restores that don't match flutter-version
          # (https://github.com/subosito/flutter-action/issues/230). Re-enable only
          # with a version-scoped cache-key once CI is green.

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        working-directory: ${{ github.workspace }}
        env:
          # Asset-channel mock in test/flutter_test_config.dart resolves keys
          # from this root when flutter_tester doesn't wire up flutter/assets.
          FLUTTER_WIDGET_TEST_PROJECT_ROOT: ${{ github.workspace }}
        run: flutter test --reporter expanded

      - name: Diagnose unit_test_assets (only on test failure)
        if: failure()
        working-directory: ${{ github.workspace }}
        run: |
          echo "PWD: $(pwd)"
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          ls -la
          echo "--- build/ ---"
          ls -laR build/ 2>&1 | head -200 || echo "no build dir"
          echo "--- assets/ ---"
          ls -laR assets/ 2>&1 | head -50 || echo "no assets dir"

      - name: Build web
        run: flutter build web --release --base-href "/${GITHUB_REPOSITORY##*/}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
